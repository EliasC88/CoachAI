<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Coach AI</title>
<style>
:root{
  --bg0:#ffffff;--bg1:#f4f4f4;--bg2:#ebebeb;--bg3:#e0e0e0;--bg4:#cccccc;
  --t0:#111111;--t1:#555555;--t2:#999999;
  --bd:#dddddd;--bd2:#eeeeee;
  --blue:#2a65d4;--bluebg:#e8f0fd;--bluebd:#b3caf5;
  --org:#c45e15;--orgbg:#fdf0e6;--orgbd:#f0c090;
  --grn:#2a8c3a;--grnbg:#e8f5eb;--grnbd:#a0d8ac;
  --red:#c03030;--redbg:#fde8e8;--redbd:#f0a0a0;
  --pur:#6b50d0;--purbg:#f0ecfd;--purbd:#c0aef5;
  --yel:#9a6e00;--yelbg:#fdf8e6;--yelbd:#e8d080;
  --r:4px;--mono:Consolas,'Courier New',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--t0);font-family:var(--mono);font-size:12px;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
#topbar{position:sticky;top:0;z-index:200;background:var(--bg1);border-bottom:1px solid var(--bd);padding:0 14px;height:40px;display:flex;align-items:center;gap:10px}
.logo{font-size:13px;font-weight:700;letter-spacing:.08em;flex-shrink:0}
.logo em{color:var(--blue);font-style:normal}
#phase-pill{font-size:9px;color:var(--t2);letter-spacing:.06em}
.tabs{display:flex;gap:2px;margin-left:auto}
.tab-btn{background:none;border:none;font-family:var(--mono);font-size:10px;color:var(--t2);letter-spacing:.06em;padding:4px 9px;border-radius:3px;cursor:pointer;transition:all .1s}
.tab-btn:hover{color:var(--t1);background:var(--bg2)}
.tab-btn.on{color:var(--blue);background:var(--bluebg);border:1px solid var(--bluebd)}
.main{max-width:860px;margin:0 auto;padding:16px 13px 60px}
.sec{display:none}.sec.on{display:block}
.wk-nav{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.nav-btn{background:var(--bg2);border:1px solid var(--bd);color:var(--t1);font-family:var(--mono);font-size:12px;padding:5px 11px;border-radius:3px;cursor:pointer;flex-shrink:0;transition:all .1s}
.nav-btn:hover{background:var(--bg3);color:var(--t0)}
.wk-info{flex:1;background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.wk-lbl{font-size:13px;font-weight:700;margin-bottom:2px}
.wk-dates{font-size:10px;color:var(--t2)}
.ph-badge{font-size:9px;padding:2px 8px;border-radius:3px;letter-spacing:.07em;font-weight:700;flex-shrink:0}
.ph-strip{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:8px 11px;margin-bottom:9px;font-size:11px;color:var(--t1);line-height:1.6}
.ph-strip strong{color:var(--t0)}
.day-sep{font-size:9px;font-weight:700;color:var(--t2);letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin:10px 0 5px}
.day-sep::after{content:'';flex:1;height:1px;background:var(--bd)}
.sess{border:1px solid var(--bd);border-radius:var(--r);margin-bottom:4px;overflow:hidden}
.sess-hd{display:flex;align-items:center;gap:7px;padding:8px 11px;background:var(--bg1);cursor:pointer;transition:background .1s}
.sess-hd:hover{background:var(--bg2)}
.sess-bd{padding:10px 13px;background:var(--bg2);border-top:1px solid var(--bd);font-size:11px;color:var(--t1);line-height:1.8}
.badge{font-size:9px;font-weight:700;letter-spacing:.07em;padding:2px 7px;border-radius:3px;min-width:58px;text-align:center;flex-shrink:0}
.b-boulder{background:var(--orgbg);color:var(--org);border:1px solid var(--orgbd)}
.b-run{background:var(--bluebg);color:var(--blue);border:1px solid var(--bluebd)}
.b-home{background:var(--grnbg);color:var(--grn);border:1px solid var(--grnbd)}
.b-mtb{background:var(--purbg);color:var(--pur);border:1px solid var(--purbd)}
.b-rest{background:var(--bg2);color:var(--t2);border:1px solid var(--bd)}
.stitle{font-size:12px;flex:1}
.grades{font-size:10px;color:var(--t2)}
.dur{font-size:10px;color:var(--t2);flex-shrink:0}
.arr{font-size:10px;color:var(--t2);flex-shrink:0}
.ex-lbl{font-size:9px;color:var(--grn);letter-spacing:.1em;text-transform:uppercase;margin-top:7px;margin-bottom:2px}
.ex-val{color:var(--grn)}
.warn{margin-top:7px;padding:6px 9px;background:var(--redbg);border:1px solid var(--redbd);border-radius:3px;font-size:11px;color:var(--red)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:9px}
.mcard{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:9px 10px;text-align:center}
.m-lbl{font-size:9px;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.m-val{font-size:17px;font-weight:700}
.m-unit{font-size:10px;color:var(--t1);font-weight:400}
.icard{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;font-size:11px;color:var(--t1);line-height:1.8}
.ilbl{font-size:9px;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.meal-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd2)}
.meal-row:last-child{border:none}
.mpct{color:var(--blue);font-weight:700;min-width:26px;font-size:11px}
.mkcal{color:var(--t2);margin-left:auto;font-size:10px}
.tend-card{background:var(--yelbg);border:1px solid var(--yelbd);border-radius:var(--r);padding:12px 13px;margin-bottom:7px}
.tend-lbl{font-size:9px;color:var(--yel);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.ftags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.ftag{font-size:10px;padding:3px 8px;border-radius:10px;background:var(--bg2);border:1px solid var(--bd);color:var(--t1)}

.dtype-tabs{display:flex;gap:3px;margin:10px 0 8px;background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:4px}
.dtype-btn{flex:1;background:none;border:none;font-family:var(--mono);font-size:10px;color:var(--t2);letter-spacing:.06em;padding:5px 4px;border-radius:3px;cursor:pointer;transition:all .1s;text-align:center}
.dtype-btn:hover{color:var(--t1);background:var(--bg2)}
.dtype-btn.on{color:var(--blue);background:var(--bluebg);border:1px solid var(--bluebd);font-weight:700}
.dtype-sec{display:none}.dtype-sec.on{display:block}
.meal-block{margin-bottom:8px;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.meal-hd{background:var(--bg1);padding:7px 11px;font-size:9px;font-weight:700;color:var(--t2);letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--bd)}
.meal-body{padding:9px 12px;background:var(--bg0);font-size:11px;color:var(--t1);line-height:1.7}
.meal-opt{color:var(--t0);margin-bottom:1px}
.meal-or{font-size:10px;color:var(--t2);margin:3px 0;font-style:italic}
.timing-warn{background:var(--orgbg);border:1px solid var(--orgbd);border-radius:3px;padding:7px 10px;margin-bottom:9px;font-size:11px;color:var(--org);line-height:1.6}
.timing-info{background:var(--bluebg);border:1px solid var(--bluebd);border-radius:3px;padding:7px 10px;margin-bottom:9px;font-size:11px;color:var(--blue);line-height:1.6}
.spesa-btn{width:100%;margin-top:10px;background:var(--grnbg);border:1px solid var(--grnbd);color:var(--grn);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;padding:10px;border-radius:var(--r);cursor:pointer;transition:all .15s}
.spesa-btn:hover{background:var(--grn);color:#fff}
.spesa-feedback{font-size:10px;color:var(--grn);text-align:center;margin-top:5px;min-height:16px}

.cal-btn{background:none;border:1px solid var(--bd);color:var(--t2);font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;cursor:pointer;flex-shrink:0;transition:all .1s;margin-left:4px}
.cal-btn:hover{background:var(--bluebg);color:var(--blue);border-color:var(--bluebd)}
.cal-panel{margin-top:9px;padding:10px 11px;background:var(--bg1);border:1px solid var(--bluebd);border-radius:var(--r)}
.cal-panel-lbl{font-size:9px;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;font-weight:700}
.cal-row{display:flex;gap:8px;align-items:center;margin-bottom:7px;font-size:11px;color:var(--t1)}
.cal-row label{min-width:36px;color:var(--t2);font-size:10px}
.cal-row input{background:var(--bg0);border:1px solid var(--bd);color:var(--t0);font-family:var(--mono);font-size:11px;padding:4px 7px;border-radius:3px;flex:1}
.cal-confirm{background:var(--bluebg);border:1px solid var(--bluebd);color:var(--blue);font-family:var(--mono);font-size:10px;font-weight:700;padding:6px 14px;border-radius:3px;cursor:pointer;width:100%;letter-spacing:.06em;transition:all .1s}
.cal-confirm:hover{background:var(--blue);color:#fff}

.hw-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hw-hd-lbl{font-size:14px;font-weight:700}
.hw-hd-dur{font-size:10px;color:var(--t2)}
.hw-cat{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.hw-cat-lbl{font-size:9px;color:var(--grn);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;font-weight:700}
.hw-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd2);font-size:11px;color:var(--t1)}
.hw-row:last-child{border:none}
.hw-name{flex:1;color:var(--t0)}
.hw-sets{color:var(--grn);font-weight:700;flex-shrink:0;min-width:46px;text-align:right}
.hw-equip{color:var(--t2);font-size:10px;flex-shrink:0;min-width:110px;text-align:right}
.hw-link{color:var(--grn);text-decoration:underline;cursor:pointer;font-size:11px}
.hw-vid{color:var(--grn);text-decoration:none;font-size:10px}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">COACH<em>AI</em></div>
  <div id="phase-pill"></div>
  <div class="tabs">
    <button class="tab-btn on" onclick="setTab('programma',this)">SETTIMANA</button>
    <button class="tab-btn" id="tab-home" onclick="setTab('home',this)">HOME</button>
    <button class="tab-btn" onclick="setTab('nutri',this)">NUTRI</button>
    <button class="tab-btn" onclick="setTab('tendini',this)">TENDINI</button>
  </div>
</div>
<div class="main">
  <div class="sec on" id="sec-programma">
    <div class="wk-nav">
      <button class="nav-btn" onclick="chWk(-1)">◀</button>
      <div class="wk-info">
        <div><div class="wk-lbl" id="wk-lbl"></div><div class="wk-dates" id="wk-dates"></div></div>
        <div id="ph-badge" class="ph-badge"></div>
      </div>
      <button class="nav-btn" onclick="chWk(1)">▶</button>
    </div>
    <div class="ph-strip" id="ph-strip"></div>
    <div id="sessions"></div>
  </div>
  <div class="sec" id="sec-home"></div>
  <div class="sec" id="sec-nutri"></div>
  <div class="sec" id="sec-tendini"></div>
</div>
<script>

};
const A1='Push-up 3×10 · Face pull 3×15 · Reverse wrist curl 3×15 · Plank 3×45"';
const A2=A1+' · Dead hang 3×10"';
const A3=A2+' · Negative pull-up 3×4 (4–5" discesa)';
const A4=A2+' · Negative pull-up 3×5';

const WK=[
{wk:1,ph:1,pn:'Adattamento',lbl:'W1',d:'11–17 mag',note:'Tecnica pura. Adattamento tendini. Regola 48–72h tra sessioni boulder.',
 groups:[
  {label:'SESSIONI BOULDER',s:[
    {t:'boulder',title:'Boulder #1',dur:'60min',g:'V1–V3',desc:'Crimps indoor più aggressivi degli scogli. Non insistere su problemi che non vengono.',ex:A1,w:'Dolore acuto alle dita = stop immediato.'},

  {label:'SESSIONI CORSA',s:[

  {label:'HOME DAY',s:[

  {label:'SESSIONI CORSA',s:[

    {t:'run',title:'Corsa #2',dur:'~20min',desc:"1'30\" / 1' × 8."}]},
  {label:'HOME DAY',s:[
    {t:'home',title:'Home Workout',dur:'~20min',ex:H0}]}
 ]},

    {t:'boulder',title:'Boulder #2',dur:'90–105min',g:'V3–V5',desc:'Chiudi la fase con solidità.',ex:A4}]},
  {label:'SESSIONI CORSA',s:[

  {label:'MER 10',s:[
    {t:'mtb',title:'MTB',dur:'variabile',desc:'Uscita breve con dislivello.'}]},
  {label:'VEN 12',s:[

  {label:'SAB 13',s:[

 ]},

  {label:'SESSIONI CORSA',s:[
    {t:'run',title:'Intervalli',dur:'~26min',desc:"2' / 1' × 8."},
    {t:'run',title:'Corsa continua',dur:'~33min',desc:"5km Z2."}]},
  {label:'HOME DAY',s:[
    {t:'home',title:'Home Workout',dur:'~20min',ex:H0}]}
 ]},
{wk:8,ph:2,pn:'Costruzione',lbl:'W8',d:'27 giu–3 lug',note:'Fine costruzione. Preparazione al volume 4x di luglio.',
 groups:[
  {label:'SESSIONI BOULDER',s:[
    {t:'boulder',title:'Boulder #1',dur:'90min',g:'V3–V5',desc:'Fine costruzione. Consolida.',ex:A4},
    {t:'boulder',title:'Boulder #2',dur:'90min',g:'V3–V5',ex:A4},
    {t:'boulder',title:'Boulder #3',dur:'90min',g:'V3–V4',ex:'Face pull 3×15 · Reverse wrist curl 3×15 · Plank 3×45"'}]},
  {label:'SESSIONI CORSA',s:[
    {t:'run',title:'Intervalli',dur:'~26min',desc:"2' / 1' × 8."},
    {t:'run',title:'Corsa continua',dur:'~38min',desc:"5–6km Z2. Ultima prima del blocco sviluppo."}]},
  {label:'HOME DAY',s:[
    {t:'home',title:'Home Workout',dur:'~20min',ex:H0}]}
 ]},
{wk:9,ph:3,pn:'Sviluppo',lbl:'W9',d:'4–10 lug',note:'4x boulder: 2 HARD + 2 tecnica/volume. Min 1 riposo obbligatorio.',
 groups:[
  {label:'SESSIONI BOULDER',s:[
    {t:'boulder',title:'Boulder #1 HARD',dur:'90–105min',g:'V4–V6',desc:'Riposo completo tra tentativi (3–5min).',ex:A5},
    {t:'boulder',title:'Boulder #2 HARD',dur:'90–105min',g:'V4–V6',desc:'Seconda hard. Ascolta le dita.',ex:'Push-up 3×10 · Face pull 3×15 · Dead hang 3×10"'},
    {t:'boulder',title:'Boulder #3 Tecnica',dur:'90min',g:'V3–V5',desc:'Focus piedi, lettura problema.',ex:'Face pull 3×15 · Reverse wrist curl 3×15 · Plank 3×45"'},

  5:{bg:'#fde8e8',bd:'#f0a0a0',c:'#c03030',lb:'PICCO'}
};
const START=new Date(2026,4,11);
const WK_STARTS=[
  new Date(2026,4,11),new Date(2026,4,18),new Date(2026,4,25),new Date(2026,5,1),
  new Date(2026,5,8),new Date(2026,5,13),new Date(2026,5,20),new Date(2026,5,27),
  new Date(2026,6,4),new Date(2026,6,11),new Date(2026,6,18),new Date(2026,6,25),
  new Date(2026,7,1),new Date(2026,7,8),new Date(2026,7,15),new Date(2026,7,22),
  new Date(2026,8,1),new Date(2026,8,8),new Date(2026,8,15)
];
var SESSION_DATA={};
let cw=Math.max(1,Math.min(19,Math.floor((new Date()-START)/(7*864e5))+1));

function render(){
  const w=WK[cw-1],ph=PHC[w.ph];
  document.getElementById('wk-lbl').textContent=w.lbl+' · '+w.pn;
  document.getElementById('wk-dates').textContent=w.d;
  const pb=document.getElementById('ph-badge');
  pb.textContent=ph.lb;
  pb.style.cssText=`background:${ph.bg};border:1px solid ${ph.bd};color:${ph.c};font-size:9px;padding:2px 8px;border-radius:3px;letter-spacing:.07em;font-weight:700`;
  document.getElementById('phase-pill').textContent='FASE '+w.ph+' / 5  ·  W'+cw+' / 19';
  document.getElementById('ph-strip').innerHTML='<strong>Obiettivo:</strong> '+w.note;
  let h='',gi=0;
  SESSION_DATA={};
  const wkStart=WK_STARTS[cw-1];
  w.groups.forEach(g=>{
    h+=`<div class="day-sep">${g.label}</div>`;
    g.s.forEach(s=>{
      const id='s'+gi;
      const defDate=new Date(wkStart);
      if(s.t==='run') defDate.setDate(defDate.getDate()+1);
      else if(s.t==='home') defDate.setDate(defDate.getDate()+3);
      else if(s.t==='mtb') defDate.setDate(defDate.getDate()+2);
      const dd=defDate.toISOString().split('T')[0];
      SESSION_DATA[id]={title:s.title+' - '+w.lbl,desc:(s.desc||'')+(s.ex?' | '+s.ex:''),dur:s.dur,date:dd};
      h+=`<div class="sess">
        <div class="sess-hd" onclick="tog('${id}')">
          <span class="badge b-${s.t}">${s.t.toUpperCase()}</span>
          <span class="stitle">${s.title}</span>
          ${s.g?`<span class="grades">${s.g}</span>`:''}
          <span class="dur">${s.dur}</span>
          <button class="cal-btn" onclick="event.stopPropagation();toggleCal('${id}')" title="Aggiungi al calendario">&#128197;</button>
          <span class="arr" id="a${id}">▸</span>
        </div>
        <div class="sess-bd" id="b${id}" style="display:none">
          ${s.desc?`<div>${s.desc}</div>`:''}
          ${s.ex&&s.t!=='home'?`<div class="ex-lbl">ESERCIZI</div><div class="ex-val">${s.ex}</div>`:''}
          ${s.t==='home'?`<div class="hw-link" onclick="event.stopPropagation();jumpHome()">▸ Vedi scheda Home Workout completa</div>`:''}
          ${s.w?`<div class="warn">⚠ ${s.w}</div>`:''}
          <div class="cal-panel" id="cp${id}" style="display:none">
            <div class="cal-panel-lbl">&#128197; Aggiungi al calendario</div>
            <div class="cal-row"><label>Data</label><input type="date" id="cd${id}" value="${dd}"></div>
            <div class="cal-row"><label>Ora</label><input type="time" id="ct${id}" value="19:00"></div>
            <button class="cal-confirm" onclick="createICS('${id}')">Crea Evento</button>
          </div>
        </div>
      </div>`;
      gi++;
    });
  });
  document.getElementById('sessions').innerHTML=h;
}
function tog(id){
  const b=document.getElementById('b'+id),a=document.getElementById('a'+id);
  const v=b.style.display==='none';
  b.style.display=v?'block':'none';
  a.textContent=v?'▾':'▸';
}
function toggleCal(id){
  const p=document.getElementById('cp'+id);
  const b=document.getElementById('b'+id);
  if(b.style.display==='none'){b.style.display='block';document.getElementById('a'+id).textContent='▾';}
  p.style.display=p.style.display==='none'?'block':'none';
}
function createICS(id){
  var d=SESSION_DATA[id];
  var dateVal=document.getElementById('cd'+id).value;
  var timeVal=document.getElementById('ct'+id).value;
  if(!dateVal||!timeVal)return;
  var durStr=d.dur||'90min';
  var durMatch=durStr.match(/[0-9]+/);
  var mins=durMatch?parseInt(durMatch[0]):90;
  var start=new Date(dateVal+'T'+timeVal);
  var end=new Date(start.getTime()+mins*60000);
  function pad(n){return String(n).padStart(2,'0');}
  function fmtDt(dt){return dt.getFullYear()+''+pad(dt.getMonth()+1)+''+pad(dt.getDate())+'T'+pad(dt.getHours())+''+pad(dt.getMinutes())+'00';}
  var desc=d.desc||'';
  var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CoachAI//EN\r\nCALSCALE:GREGORIAN\r\nBEGIN:VEVENT\r\nDTSTART:'+fmtDt(start)+'\r\nDTEND:'+fmtDt(end)+'\r\nSUMMARY:'+d.title+'\r\nDESCRIPTION:'+desc+'\r\nEND:VEVENT\r\nEND:VCALENDAR';
  var blob=new Blob([ics],{type:'text/calendar'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=d.title.replace(/[^a-z0-9]/gi,'_')+'.ics';
  a.click();
  URL.revokeObjectURL(url);
}
function chWk(d){if(cw+d>=1&&cw+d<=19){cw+=d;render();}}
function jumpHome(){setTab('home',document.getElementById('tab-home'));window.scrollTo(0,0);}
function setTab(t,el){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-'+t).classList.add('on');
  el.classList.add('on');
}

function creaListaSpesa(){
  var lista=['Carne - Pollo','Carne - Manzo','Carne - Tacchino','Carne - Maiale','Pesce - Salmone','Pesce - Tonno','Pesce - Sardine','Latticini - Latte','Latticini - Uova','Latticini - Yogurt greco','Latticini - Parmigiano','Latticini - Ricotta','Frutta - Banana','Frutta - Frutta fresca mista','Frutta secca - Noci','Frutta secca - Frutta secca mista','Frutta secca - Semi di zucca','Verdura - Peperoni','Verdura - Patate','Pasta e Cereali - Pasta','Pasta e Cereali - Riso','Pasta e Cereali - Avena','Pasta e Cereali - Granola','Pane e Panetteria - Pane integrale','Pane e Panetteria - Pane','Dispensa - Miele','Dispensa - Marmellata','Dispensa - Lenticchie','Condimenti - Olio evo','Integratori - Collagene 15g','Integratori - Vitamina C'].join('\n');
  var fb=document.getElementById('spesa-feedback');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(lista).then(function(){
      fb.textContent='Lista copiata negli appunti.';
    }).catch(function(){
      fb.textContent='Copia non riuscita — prova da Safari.';
    });
  } else {
    fb.textContent='Clipboard non disponibile.';
  }
}

(function(){
  function parse(str){
    return str.split(' · ').map(function(item){
      var parts=item.split(' → ');
      var left=parts[0].trim();
      var equip=(parts[1]||'').trim();
      var m=left.match(/^(.+?)\s(\S*×\S+)$/);
      return {name:m?m[1]:left, sets:m?m[2]:'', equip:equip};
    });
  }
  function cat(name){
    var n=name.toLowerCase();
    if(/bicep|hammer/.test(n))return 'BRACCIA';
    if(/pull|hang|chin/.test(n))return 'TRAZIONE';
    if(/band/.test(n))return 'SPALLA · POLSO (STABILITÀ)';
    if(/push/.test(n))return 'SPINTA';
    if(/plank|hollow|crunch/.test(n))return 'CORE';
    return 'ALTRO';
  }
  var order=['TRAZIONE','SPALLA · POLSO (STABILITÀ)','BRACCIA','SPINTA','CORE','ALTRO'];
  var exs=parse(H0);
  var groups={};
  exs.forEach(function(e){var c=cat(e.name);(groups[c]=groups[c]||[]).push(e);});
  var h='';
  h+='<div class="hw-hd"><div class="hw-hd-lbl">HOME WORKOUT</div><div class="hw-hd-dur">~20min</div></div>';
  h+='<div class="icard" style="margin-bottom:11px">';
  h+='<div class="ilbl">QUANDO</div>';
  h+='Giorno HOME della settimana. Lavoro accessorio — solo nei giorni di allenamento attivo, mai nei giorni di riposo.';
  h+='</div>';
  order.forEach(function(c){
    if(!groups[c])return;
    h+='<div class="hw-cat"><div class="hw-cat-lbl">'+c+'</div>';
    groups[c].forEach(function(e){
      var vid=H0_VIDEOS[e.name.toLowerCase()];
      var vidLink=vid?'<a class="hw-vid" href="'+vid+'" target="_blank" rel="noopener">▶</a>':'';
      h+='<div class="hw-row"><span class="hw-name">'+e.name+' '+vidLink+'</span><span class="hw-sets">'+e.sets+'</span><span class="hw-equip">'+e.equip+'</span></div>';
    });
    h+='</div>';
  });
  document.getElementById('sec-home').innerHTML=h;
})();
